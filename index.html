<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>En Construcción</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #000000, #1a1a1a);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 400px;
      padding: 30px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
    }

    .logo {
      width: 100px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      color: #FFD700;
    }

    p {
      font-size: 16px;
      color: #cccccc;
      margin-bottom: 25px;
    }

    .loader {
      border: 4px solid rgba(255,255,255,0.1);
      border-top: 4px solid #FFD700;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>

<body>

  <div class="container">
    
    <!-- Si tienes logo, descomenta esta línea -->
    <!-- <img src="logo.png" alt="Logo" class="logo"> -->

    <h1>Landing en Construcción</h1>

    <p>
      Estamos preparando algo increíble para ti.<br>
      Muy pronto podrás acceder a toda la información.
    </p>

    <div class="loader"></div>

    <div class="footer">
      © 2026 • Powered by Integral360
    </div>

  </div>

</body>
</html>
